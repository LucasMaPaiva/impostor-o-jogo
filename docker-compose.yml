
services:
  mongodb:
    image: mongo:latest
    container_name: impostor-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - impostor-network

  app:
    build:
      context: .
      dockerfile: .docker/Dockerfile
    container_name: impostor-app
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/impostor
      - PORT=3000
    depends_on:
      - mongodb
    networks:
      - impostor-network

  nginx:
    image: nginx:alpine
    container_name: impostor-nginx
    ports:
      - "2500:80"
    volumes:
      - ./.docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - impostor-network

networks:
  impostor-network:
    driver: bridge

volumes:
  mongo-data:
